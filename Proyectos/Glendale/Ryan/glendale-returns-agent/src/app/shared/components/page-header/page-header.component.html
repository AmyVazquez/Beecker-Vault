<!-- Header principal del dashboard -->
<!-- Se adapta a cada vista mediante los inputs showBackButton y showRunHistory -->
<header class="page-header">

  <div class="page-header__left">
    <!-- Modo regreso: muestra botón "← Back to..." (Run History y Transaction Details) -->
    @if (showBackButton()) {
      <button class="page-header__back" (click)="backClick.emit()">
        ← {{ backLabel() }}
      </button>

    } @else {
      <!-- Modo identidad: muestra avatar y nombre del agente (Summary) -->
      <div class="page-header__identity">
        <div class="page-header__avatar">R</div>
        <div>
          <h1 class="page-header__title">{{ agentName() }}</h1>
          <p class="page-header__subtitle">{{ subtitle() }}</p>
        </div>
      </div>
    }
  </div>

  <!-- Acciones del lado derecho del header -->
  <div class="page-header__actions">
    <!-- Botón Run History: visible solo en la vista Summary -->
    @if (showRunHistory()) {
      <button class="btn btn--secondary" (click)="runHistoryClick.emit()">
        Run History
      </button>
    }
  </div>

</header>
